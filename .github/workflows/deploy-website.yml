name: Generate and Deploy Website

on:
  push:
    branches:
      - main
    paths:
      - 'dist/commands/**'
      - 'dist/report.json'
      - 'bin-website/**'
      - 'website/**'
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'package.json'
      - '.github/workflows/deploy-website.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-website:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Checkout Dist
        uses: actions/checkout@v4
        with:
          path: dist
          ref: dist

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'website/package-lock.json'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install website dependencies
        working-directory: website
        run: npm ci

      - name: Build Angular application
        working-directory: website
        run: npm run build:prod

      - name: Build Rust metadata generator
        run: cargo build -p arma3-wiki-website --release

      - name: Generate metadata
        run: ./target/release/website

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: website
          path: dist-website
          retention-days: 5

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist-website
          cname: wiki.hemtt.dev

      - name: Create summary
        run: |
          echo "## Website Generated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Generated files:" >> $GITHUB_STEP_SUMMARY
          find dist-website -type f -exec ls -lh {} \; | awk '{print "- " $9 " (" $5 ")"}' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Total size: $(du -sh dist-website | cut -f1)" >> $GITHUB_STEP_SUMMARY
