name: removeAllEventHandlers
desc: Removes all event handlers of given type that were added by [[addEventHandler]] '''and''' resets event handler's creation index to 0.
groups:
- Event Handlers
syntax:
- call: !Binary
  - target
  - handlerType
  ret:
    type: Nothing
  left: !Item
    name: target
    desc: or {{GVI|arma3|2.10}} [[Group]]
    type: Object
  right: !Item
    name: handlerType
    desc: see [[:Category:Event Handlers|Event Handlers]]
    type: String
argument_loc: Unspecified
effect_loc: Local
since: {}
examples:
- <sqf>player removeAllEventHandlers "Killed";</sqf>
see_also:
- :Category:Event
- Handlers|Event
- Handler
- List
- removeEventHandler
- addEventHandler
- removeMissionEventHandler
