name: flagAnimationPhase
desc: Returns flag position on the flag pole.
multiplayer_note: The result is local to the PC on which command is executed.
groups:
- Flags
syntax:
- call: !Unary flag
  ret:
    type: !NumberRange
    - 0
    - 1
    desc: flag position, where 0 is bottom of the flag pole, 1 is the top of the flag pole
  right: !Item
    name: flag
    desc: flag pole of the type {{hl|"FlagCarrier"}}
    type: Object
argument_loc: Global
effect_loc: Unspecified
since:
  arma3: '1.68'
examples:
- <sqf>flagAnimationPhase _flag1;</sqf>
see_also:
- setFlagAnimationPhase
- Arma
- '3:'
- Flag
- Textures
