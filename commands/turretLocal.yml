name: turretLocal
desc: Checks if a turret is [[Multiplayer Scripting#Locality|local]].
multiplayer_note: |-
  A vehicle turret will change locality when player gunner gets in it, just like vehicle changes locality when player driver gets in it.
  Many commands for turrets work only where turret is [[Multiplayer Scripting#Locality|local]].
  When gunner leaves turret it is supposed to change locality to the locality of the vehicle.
groups:
- Turrets
syntax:
- call: !Binary
  - vehicle
  - turretPath
  ret:
    type: Boolean
  left: !Item
    name: vehicle
    type: Object
  right: !Item
    name: turretPath
    desc: supports [-1] for driver turret
    type: TurretPath
argument_loc: Global
effect_loc: Unspecified
since: {}
examples:
- <sqf>_isLocal = vehicle player turretLocal [0];</sqf>
- <sqf>if (heli turretLocal [1]) then { heli setVehicleAmmo 1 };</sqf>
- <sqf>if (isNil { heli turretLocal [5] }) then { hint "Turret 5 is non-existent" };</sqf>
see_also:
