name: formationTask
desc: Return the current task of the unit in the formation.
groups:
- Groups
syntax:
- call: !Unary unit
  ret:
    type: String
    desc: ': "EXCLUDED", "MOVE", "COVER", "LEADER", "NOTHING"'
  right: !Item
    name: unit
    type: Object
argument_loc: Unspecified
effect_loc: Unspecified
since:
  arma1: '1.00'
  arma2: '1.00'
  arma2oa: '1.50'
  tkoh: '1.00'
  arma3: '0.50'
examples:
- <sqf>_currentTask = formationTask _unit;</sqf>
see_also:
- setFormationTask
