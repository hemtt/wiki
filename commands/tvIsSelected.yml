name: tvIsSelected
desc: Returns true if given treeview item is selected.
groups:
- GUI Control - Tree View
syntax:
- call: !Binary
  - control
  - path
  ret:
    type: Boolean
  left: !Item
    name: control
    type: Control
  right: !Item
    name: path
    type: TreeViewPath
argument_loc: Unspecified
effect_loc: Unspecified
since:
  arma3: '2.02'
examples:
- <sqf>_control tvIsSelected [0];</sqf>
see_also:
- tvSelection
- tvSetSelected
