name: infoPanelComponents
desc: Returns array of all components available to given object info panel.
groups:
- Custom Panels
syntax:
- call: !Binary
  - unit
  - panelID
  ret:
    type: !ArraySized
    - name: className
      type: String
      default: null
      desc: component classname as defined in object/vehicle config
      since: null
    - name: componentType
      type: String
      default: null
      desc: componentType - component type
      since: null
    - name: isAccessible
      type: Boolean
      default: null
      desc: boolean flag that shows if component is currently accessible (lack of required item can make it temporarily inaccessible)
      since: null
  left: !Item
    name: unit
    desc: the concerned vehicle
    type: Object
  right: !Item
    name: panelID
    desc: '"left" or "right" can be used as panel names'
    type: String
- call: !Binary
  - - unit
    - turretPath
  - panelID
  ret:
    type: !ArraySized
    - name: className
      type: String
      default: null
      desc: component classname as defined in object/vehicle config
      since: null
    - name: componentType
      type: String
      default: null
      desc: componentType - component type
      since: null
    - name: isAccessible
      type: Boolean
      default: null
      desc: boolean flag that shows if component is currently accessible (lack of required item can make it temporarily inaccessible)
      since: null
  left: !Array
  - !Item
    name: unit
    desc: the concerned vehicle
    type: Object
  - !Item
    name: turretPath
    desc: turret index
    type: TurretPath
  right: !Item
    name: panelID
    desc: '"left" or "right" can be used as panel names'
    type: String
argument_loc: Unspecified
effect_loc: Unspecified
since: {}
examples:
- |-
  <sqf>
  // returns array of all components configured for _helicopter pilot seat
  private _componentsData = [_helicopter, [-1]] infoPanelComponents "left";
  </sqf>
see_also:
- Arma
- '3:'
- Custom
- Info
- infoPanel
- infoPanels
- setInfoPanel
- enableInfoPanelComponent
- infoPanelComponentEnabled
