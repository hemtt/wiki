name: keyImage
desc: Returns a structured text, containing an image or name (if no image is found) of the button, on the keyboard, mouse or joystick, with the given code.
groups:
- System
syntax:
- call: !Unary dikCode
  ret:
    type: StructuredText
  right: !Item
    name: dikCode
    desc: or {{GVI|arma3|2.08|size= 0.75}} [[String]]
    type: Number
argument_loc: Unspecified
effect_loc: Unspecified
since: {}
examples:
- <sqf>_image = keyImage 28; // result is "Enter"</sqf>
- |-
  From Arma 3 v2.08:
  <sqf>_image = keyImage "-1660944350"; // result is "Right Ctrl+G"</sqf>
see_also:
- keyName
- actionKeys
- actionKeysImages
- actionKeysNames
- actionKeysNamesArray
- DIK
- KeyCodes
