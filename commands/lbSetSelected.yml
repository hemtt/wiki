name: lbSetSelected
desc: |-
  Sets the selection state of the given row of the given listbox of style LB_MULTI.
  The command has to be called for every row which is needed to be selected in multi-selection listbox. Use negative index -1 to select/deselect all rows (since {{GVI|arma3|2.12}}).
  For single selection listbox use [[lbSetCurSel]] instead.
groups:
- GUI Control - ListBox
syntax:
- call: !Binary
  - control
  - - index
    - selected
    - forceEH
  ret:
    type: Nothing
  left: !Item
    name: control
    type: Control
  right: !Array
  - !Item
    name: index
    type: !ArrayUnsized
      value: !OneOf
      - type: Number
        desc: null
        since: null
      - type: !ArrayUnsized
          value: Number
        desc: null
        since:
          arma3: '2.12'
  - !Item
    name: selected
    type: Boolean
  - !Item
    name: forceEH
    desc: will force [[User_Interface_Event_Handlers#onLBSelChanged | lbSelChanged]] EH to fire
    type: Boolean
    optional: true
    default: 'false'
    since:
      arma3: '2.12'
argument_loc: Unspecified
effect_loc: Unspecified
since: {}
examples:
- <sqf>_control lbSetSelected [0, true];</sqf>
see_also:
- lbAdd
- lbClear
- lbColor
- lbCurSel
- lbData
- lbDelete
- lbIsSelected
