name: direction
desc: Returns the direction an object or a location is facing (differs from [[getDir]] in that this also works with locations).
groups:
- Object Manipulation
- Locations
syntax:
- call: !Unary object
  ret:
    type: !NumberRange
    - 0
    - 360
    desc: Direction in degrees
  right: !Item
    name: object
    desc: or [[Location]]
    type: Object
argument_loc: Global
effect_loc: Unspecified
since:
  ofp: '1.00'
  ofpe: '1.00'
  arma1: '1.00'
  arma2: '1.00'
  arma2oa: '1.50'
  tkoh: '1.00'
  arma3: '0.50'
examples:
- |-
  <sqf>
  player setDir 90;
  _d = direction player;//returns 90
  </sqf>
see_also:
- getDir
- getDirVisual
- setDir
- setDirection
