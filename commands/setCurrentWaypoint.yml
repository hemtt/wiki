name: setCurrentWaypoint
desc: Sets the currently active waypoint for a group.
groups:
- Waypoints
syntax:
- call: !Binary
  - groupName
  - waypoint
  ret:
    type: Nothing
  left: !Item
    name: groupName
    desc: or [[Group]]
    type: Object
  right: !Item
    name: waypoint
    type: Waypoint
argument_loc: Local
effect_loc: Unspecified
since:
  arma1: '1.05'
  arma2: '1.00'
  arma2oa: '1.50'
  tkoh: '1.00'
  arma3: '0.50'
examples:
- <sqf>_grp setCurrentWaypoint [_grp, 1];</sqf>
see_also:
- waypoints
