name: getPosASL
desc: Returns the object position height above sea level.
groups:
- Positions
syntax:
- call: !Unary object
  ret:
    type: Position3dASL
  right: !Item
    name: object
    type: Object
argument_loc: Global
effect_loc: Unspecified
since:
  ofp: '1.99'
  ofpe: '1.00'
  arma1: '1.00'
  arma2: '1.00'
  arma2oa: '1.50'
  tkoh: '1.00'
  arma3: '0.50'
examples:
- <sqf>_aslPos = getPosASL player;</sqf>
- '<sqf>hint format ["position above sea level: %1", (getPosASL player) select 2];</sqf>'
see_also:
- getPosASLVisual
- setPosASL
- setPosASL2
- position
- getPos
- getPosATL
- getPosASLW
- visiblePosition
- visiblePositionASL
- getTerrainHeightASL
- setUnitFreefallHeight
