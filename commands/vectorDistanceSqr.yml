name: vectorDistanceSqr
desc: Squared distance between two 3D vectors.
groups:
- Math - Vectors
syntax:
- call: !Binary
  - vector1
  - vector2
  ret:
    type: Number
  left: !Item
    name: vector1
    desc: 3D or {{GVI|arma3|2.00|size= 0.75}} 2D vector (z coordinate is defaulted to 0)
    type: !OneOf
    - type: Vector3d
      desc: null
      since: null
    - type: Vector2d
      desc: null
      since: null
  right: !Item
    name: vector2
    desc: 3D or {{GVI|arma3|2.00|size= 0.75}} 2D vector (z coordinate is defaulted to 0)
    type: !OneOf
    - type: Vector3d
      desc: null
      since: null
    - type: Vector2d
      desc: null
      since: null
argument_loc: Unspecified
effect_loc: Unspecified
since:
  arma3: '1.22'
examples:
- <sqf>_distSqr = getPos player vectorDistanceSqr [0,0,2];</sqf>
see_also:
- vectorAdd
- vectorDiff
- vectorCrossProduct
- vectorDotProduct
- vectorCos
- vectorMagnitude
- vectorMagnitudeSqr
- vectorMultiply
- vectorDistance
- vectorDir
- vectorUp
- setVectorDir
- setVectorUp
- setVectorDirAndUp
- distanceSqr
- vectorNormalized
- vectorFromTo
