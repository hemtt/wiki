name: allAddonsInfo
desc: Returns the list of all loaded addons.
groups:
- Mods and Addons
syntax:
- call: Nular
  ret:
    type: !ArrayUnsized
      value: !ArraySized
      - name: prefix
        type: String
        default: null
        desc: addon prefix
        since: null
      - name: version
        type: String
        default: null
        desc: addon revision version
        since: null
      - name: isPatched
        type: Boolean
        default: null
        desc: '[[true]] if patching is enabled and this addon is being patched'
        since: null
      - name: modIndex
        type: Number
        default: null
        desc: index of mod in [[getLoadedModsInfo]] array. -1 if not found.
        since:
          arma3: '2.14'
      - name: hash
        type: String
        default: null
        desc: hash of the addon PBO file. "" if hashing fails.
        since:
          arma3: '2.14'
argument_loc: Unspecified
effect_loc: Unspecified
since:
  arma3: '2.00'
examples:
- "<sqf>\nallAddonsInfo\n/*\n\t[\n\t\t[\"bin\\\",\"150301\",false,-1,\"66b6d1a87da30e0386fec881504c14a0a6025cb1\"],\n\t\t[\"core\\\",\"129618\",false,-1,\"49e1b8da67de848c8ea058fd8512c222ccb6d919\"],\n\t\t[\"Languagecore_F\\\",\"150376\",false,-1,\"2ee7b09d60f916d7e56934632f55683a14a636b7\"],\n\t\t[\"a3\\anims_f_aow\\\",\"149768\",false,0,\"59df21ad1fc6939c460a555b3af662f725564b37\"],\n\t\t[\"a3\\dubbing_radio_f_enoch\\\",\"150070\",false,1,\"5ca436c61a634fcbd28ca9480a4c8249c5b0e4bd\"],\n\t\t[\"a3\\armor_f_tank\\\",\"150292\",false,2,\"6d0ea8b45ff4cd316b3d6c5575def9dd048e198e\"],\n\t\t[\"a3\\music_f_tacops\\\",\"124064\",false,3,\"435c2b0338fe6bec7685002dca7c47778abf44ee\"],\n\t\t...\n\t]\n*/\n</sqf>"
see_also:
- addonFiles
