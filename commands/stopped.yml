name: stopped
desc: Check if unit is stopped by [[stop]] command.
groups:
- Unit Control
syntax:
- call: !Unary unitName
  ret:
    type: Boolean
  right: !Item
    name: unitName
    type: Object
argument_loc: Unspecified
effect_loc: Unspecified
since:
  ofp: '1.00'
  ofpe: '1.00'
  arma1: '1.00'
  arma2: '1.00'
  arma2oa: '1.50'
  tkoh: '1.00'
  arma3: '0.50'
examples:
- '<sqs>? (stopped _loon1) : hint "Loon1 is stopped"</sqs>'
see_also:
- stop
