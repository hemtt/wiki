name: magazinesAmmoCargo
desc: Returns an array of subarrays with the type names and ammo left of all the vehicle's cargo or container magazines.
groups:
- Vehicle Inventory
syntax:
- call: !Unary vehicle
  ret:
    type: !ArrayUnsized
      value: !ArraySized
      - name: class
        type: String
        default: null
        desc: Class name of the magazine
        since: null
      - name: ammo
        type: Number
        default: null
        desc: Number of rounds loaded
        since: null
  right: !Item
    name: vehicle
    type: Object
argument_loc: Unspecified
effect_loc: Unspecified
since: {}
examples:
- <sqf>magazinesAmmoCargo vehicle player;</sqf>
- "<sqf>magazinesAmmoCargo uniformContainer player;</sqf>\n<sqf>\n// returns:\n[\n\t[\"30Rnd_65x39_caseless_mag\",30],\n\t[\"30Rnd_65x39_caseless_mag\",30],\n\t[\"Chemlight_green\",1]\n]\n</sqf>"
see_also:
- magazinesAmmo
- magazinesAmmoFull
