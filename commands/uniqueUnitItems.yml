name: uniqueUnitItems
desc: |-
  Returns hashmap of all items in units inventory as [classname, count] pairs.
  {{Feature|informative|
  * ''weaponItems'', ''uniformItems'', ''vestItems'', ''backpackItems'' arguments use the following [[Number]] values:
  ** 0: do not return value
  ** 1: returns container only (weapon or container)
  ** 2: returns container and its content
  * weapons/containers that are stored inside containers (e.g weapon in backpack) always return all contents if contents for the parent container are enabled.
  }}
groups:
- Unit Inventory
syntax:
- call: !Unary unit
  ret:
    type: HashMapUnknown
    desc: in format itemClassname ([[String]]) &rarr; amount ([[Number]])
  right: !Item
    name: unit
    type: Object
- call: !Unary
  - unit
  - weaponsItems
  - uniformItems
  - vestItems
  - backpackItems
  - assignedItems
  ret:
    type: HashMapUnknown
    desc: in format itemClassname ([[String]]) &rarr; amount ([[Number]])
  right: !Array
  - !Item
    name: unit
    type: Object
  - !Item
    name: weaponsItems
    desc: weapons (including binoculars) and their accessories (flashlight etc), loaded magazines
    type: Number
    optional: true
    default: '2'
  - !Item
    name: uniformItems
    desc: ''
    type: Number
    optional: true
    default: '2'
  - !Item
    name: vestItems
    desc: ''
    type: Number
    optional: true
    default: '2'
  - !Item
    name: backpackItems
    desc: ''
    type: Number
    optional: true
    default: '2'
  - !Item
    name: assignedItems
    desc: returns [[assignedItems]] as well as [[headgear]] and [[hmd|goggles]]
    type: Boolean
    optional: true
    default: 'true'
argument_loc: Global
effect_loc: Unspecified
since:
  arma3: '2.06'
examples:
- |-
  <sqf>
  private _unitUniqueItems = uniqueUnitItems [player, 0, 2, 2, 2, true];
  if (_unitUniqueItems getOrDefault ["FirstAidKit", 0] > 5) then { hint "I'm rich of FAK to give!"; };
  </sqf>
- <sqf>private _unitUniqueItems = uniqueUnitItems [cursorObject];</sqf>
see_also:
- getUnitLoadout
