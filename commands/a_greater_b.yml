name: '>'
desc: Returns [[true]] if '''a''' is greater than '''b''', else returns [[false]].
groups:
- Math
- Variables
syntax:
- call: !Binary
  - a
  - b
  ret:
    type: Boolean
  left: !Item
    name: a
    type: Number
  right: !Item
    name: b
    type: Number
argument_loc: Unspecified
effect_loc: Unspecified
since:
  ofp: '1.00'
  ofpe: '1.00'
  arma1: '1.00'
  arma2: '1.00'
  arma2oa: '1.50'
  tkoh: '1.00'
  arma3: '0.50'
examples:
- <sqf>if (fuel truck1 > 0) then { hint "Truck1 has some fuel left."; };</sqf>
see_also:
- Operators
