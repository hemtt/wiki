name: menuShortcut
desc: Returns shortcut related to menu entry on given path in form of a bitflag. To get the shortcut text use [[menuShortcutText]].
groups:
- GUI Control - Menu
syntax:
- call: !Unary
  - idc
  - path
  ret:
    type: Number
  right: !Array
  - !Item
    name: idc
    type: Number
  - !Item
    name: path
    type: TreeViewPath
- call: !Binary
  - control
  - path
  ret:
    type: Number
  left: !Item
    name: control
    type: Control
  right: !Item
    name: path
    type: TreeViewPath
argument_loc: Unspecified
effect_loc: Unspecified
since: {}
examples:
- <sqf>findDisplay 313 displayCtrl 120 menuShortcut [0, 1];</sqf>
see_also:
- menuShortcutText
- menuSetURL
