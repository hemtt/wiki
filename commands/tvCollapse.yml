name: tvCollapse
desc: Collapses tree item pointed to by the path. IDC means id of parent Tree View.
groups:
- GUI Control - Tree View
syntax:
- call: !Unary
  - idc
  - path
  ret:
    type: Nothing
  right: !Array
  - !Item
    name: idc
    type: Number
  - !Item
    name: path
    desc: '[] will collapse the whole tree and it will disappear'
    type: Path
- call: !Binary
  - control
  - path
  ret:
    type: Nothing
  left: !Item
    name: control
    type: Control
  right: !Item
    name: path
    desc: '[] will collapse the whole tree and it will disappear'
    type: Path
argument_loc: Local
effect_loc: Local
since: {}
examples:
- <sqf>tvCollapse [101, [0]];</sqf>
- <sqf>_ctrl tvCollapse [0];</sqf>
see_also:
