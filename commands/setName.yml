name: setName
desc: Sets the name of a location or a person (person only in single player).
groups:
- Unit Identity
- Locations
syntax:
- call: !Binary
  - thing
  - name
  ret:
    type: Nothing
  left: !Item
    name: thing
    desc: or {{GVI|arma3|1.02|size= 0.75}} [[Object]]
    type: Location
  right: !Item
    name: name
    type: String
- call: !Binary
  - unit
  - - name
    - firstName
    - lastName
  ret:
    type: Nothing
  left: !Item
    name: unit
    type: Object
  right: !Array
  - !Item
    name: name
    type: String
  - !Item
    name: firstName
    type: String
  - !Item
    name: lastName
    type: String
  since:
    arma3: '1.2'
argument_loc: Global
effect_loc: Local
since: {}
examples:
- <sqf>myLocation setName "My Location Name";</sqf>
- <sqf>player setName "New Name";</sqf>
- <sqf>player setName ["Ben Kerry","Ben","Kerry"];</sqf>
see_also:
- name
- nameSound
- setNameSound
- setIdentity
