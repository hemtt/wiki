name: getRepairCargo
desc: Returns the amount (1 is full) of repair resources in the cargo space of a repair vehicle. {{Feature|informative|Since Arma 3 v1.96 the return value for vehicles that are not configured to have ability to repair other vehicles is -1. (Prior to that the value was negative infinity)}}
groups:
- Vehicle Inventory
syntax:
- call: !Unary vehicle
  ret:
    type: Number
    desc: repair cargo value, -1 if repair cargo is not supported, 0 if the vehicle is ![[alive]] or [[isNull]]
  right: !Item
    name: vehicle
    type: Object
argument_loc: Global
effect_loc: Unspecified
since: {}
examples:
- <sqf>value = getRepairCargo vehicleName;</sqf>
see_also:
- setRepairCargo
- getAmmoCargo
- getFuelCargo
