name: typeOf
desc: Returns the class name of given target.
groups:
- Object Manipulation
syntax:
- call: !Unary target
  ret:
    type: String
    desc: config class name, or empty string if ''target'' does not have a class
  right: !Item
    name: target
    type: !OneOf
    - type: Object
      desc: null
      since: null
    - type: Control
      desc: null
      since:
        arma3: '2.22'
    - type: Display
      desc: null
      since: null
argument_loc: Unspecified
effect_loc: Unspecified
since: {}
examples:
- <sqf>if (typeOf vehicle player == "B_Heli_Light_01_armed_F") then { hint "Player is in a AH-9 Pawnee"; };</sqf>
- |-
  <sqf>
  // Since 2.22
  typeOf (findDisplay 313); // "Display3DEN"
  </sqf>
see_also:
- countType
- isKindOf
- configOf
- ctrlClassName
