name: typeOf
desc: Returns the class name of given target.
groups:
- Object Manipulation
syntax:
- call: !Unary target
  ret:
    type: String
    desc: config class name, or empty string if ''target'' does not have a class
  right: !Item
    name: target
    desc: ', since {{GVI|arma3|2.22}} [[Control]], [[Display]]'
    type: Object
argument_loc: Unspecified
effect_loc: Unspecified
since:
  ofp: '1.90'
  ofpe: '1.00'
  arma1: '1.00'
  arma2: '1.00'
  arma2oa: '1.50'
  tkoh: '1.00'
  arma3: '0.50'
examples:
- <sqf>if (typeOf vehicle player == "B_Heli_Light_01_armed_F") then { hint "Player is in a AH-9 Pawnee"; };</sqf>
- |-
  <sqf>
  // Since 2.22
  typeOf (findDisplay 313); // "Display3DEN"
  </sqf>
see_also:
- countType
- isKindOf
- configOf
- ctrlClassName
