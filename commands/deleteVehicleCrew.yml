name: deleteVehicleCrew
desc: |-
  Deletes a member of or the whole crew of a vehicle. Human players cannot be deleted.
  {{Feature|informative|This command attempts to move the given [[crew]] member out before deleting it. Made especially for deleting dead crew members, as using conventional [[deleteVehicle]] leads to all sorts of bugs and ghost objects. While the argument is global, you should take extra steps and execute this where vehicle is [[Multiplayer Scripting#Locality|local]] as moving units out of the vehicle happens where vehicle is [[Multiplayer Scripting#Locality|local]] and you want this to always precede deletion.}}
groups:
- Object Manipulation
syntax:
- call: !Binary
  - vehicle
  - unit
  ret:
    type: Nothing
  left: !Item
    name: vehicle
    type: Object
  right: !Item
    name: unit
    type: Object
- call: !Unary vehicle
  ret:
    type: Nothing
  right: !Item
    name: vehicle
    type: Object
  since:
    arma3: '2.6'
argument_loc: Global
effect_loc: Global
since: {}
examples:
- "<sqf>\n// delete when knowing the vehicle\n_helicopter deleteVehicleCrew driver _helicopter;\n\n// delete when only knowing the unit\n// vehicle _soldier deleteVehicleCrew _soldier;\t\t// may return the unit itself when used on dead crew\nobjectParent _soldier deleteVehicleCrew _soldier;\t// faster and always returns the vehicle\n</sqf>"
- |-
  Delete entire crew:
  <sqf>
  deleteVehicleCrew _tank; // since v2.06

  { _helicopter deleteVehicleCrew _x } forEach crew _helicopter; // before v2.06
  </sqf>
see_also:
- createVehicleCrew
- moveInDriver
- moveInGunner
- moveInCommander
- moveInTurret
- moveInCargo
- Arma_3:_Event_Handlers#Deleted
- '|'
- Deleted
- EH
