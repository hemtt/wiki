name: ctrlSetModelDirAndUp
desc: Sets orientation of 3D control model. It is similar to [[setVectorDirAndUp]] command for an object.
groups:
- GUI Control - Object
syntax:
- call: !Binary
  - control
  - dirAndUp
  ret:
    type: Nothing
  left: !Item
    name: control
    desc: 3D control
    type: Control
  right: !Item
    name: dirAndUp
    type: !ArraySized
    - name: vectorDir
      type: Vector3d
      desc: see [[vectorDir]]
      since: null
    - name: vectorUp
      type: Vector3d
      desc: see [[vectorUp]]
      since: null
argument_loc: Unspecified
effect_loc: Unspecified
since: {}
examples:
- <sqf>_ctrl3D ctrlSetModelDirAndUp [[0,1,0],[0,0,1]]; //default orientation</sqf>
see_also:
- ctrlModelDirAndUp
- ctrlCreate
- ctrlDelete
- ctrlModel
- ctrlSetModel
- ctrlModelScale
- ctrlSetModelScale
- ctrlPosition
- ctrlSetPosition
- ctrlClassName
- vectorDir
- vectorUp
- setVectorDirAndUp
- ctrlModelVectorSide
