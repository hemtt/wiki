name: showMap
desc: |-
  Enable Map (default [[true]]).
  {{Feature|informative|
  In {{arma2}} and later this command no longer works, the map now being an inventory item ("ItemMap" class name).
  <sqf>
  unitName removeWeapon "ItemMap";
  unitName addWeapon "ItemMap";
  </sqf>
  }}
groups:
- Map
syntax:
- call: !Unary show
  ret:
    type: Nothing
  right: !Item
    name: show
    type: Boolean
argument_loc: Unspecified
effect_loc: Unspecified
since:
  ofp: '1.00'
  ofpe: '1.00'
  arma1: '1.00'
  arma2: '1.00'
  arma2oa: '1.50'
  tkoh: '1.00'
  arma3: '0.50'
examples:
- <sqf>showMap false;</sqf>
see_also:
- showCompass
- showGPS
- showRadio
- showWatch
- showPad
- shownMap
