name: setObjectMaterialGlobal
desc: Set the material of the given selection on all computers in a network session.
groups:
- Object Manipulation
syntax:
- call: !Binary
  - obj
  - - selection
    - material
  ret:
    type: Nothing
  left: !Item
    name: obj
    type: Object
  right: !Array
  - !Item
    name: selection
    desc: or {{GVI|arma3|2.10|size= 0.75}} [[String]]
    type: Number
  - !Item
    name: material
    desc: material path. Since {{GVI|arma3|2.20}} using "#reset" would reset to default material.
    type: String
argument_loc: Global
effect_loc: Global
since: {}
examples:
- <sqf>player setObjectMaterialGlobal [0, "A3\Structures_F\Data\Windows\window_set.rvmat"];</sqf>
see_also:
- setObjectTexture
- setObjectTextureGlobal
- getObjectTextures
- setObjectMaterial
- getObjectMaterials
