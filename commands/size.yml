name: size
desc: Returns a location's size.
groups:
- Locations
syntax:
- call: !Unary location
  ret:
    type: !ArraySized
    - name: x
      type: Number
      default: null
      desc: horizontal distance in meters
      since: null
    - name: y
      type: Number
      default: null
      desc: vertical distance in meters
      since: null
  right: !Item
    name: location
    type: Location
argument_loc: Unspecified
effect_loc: Unspecified
since:
  arma1: '1.08'
  arma2: '1.00'
  arma2oa: '1.50'
  tkoh: '1.00'
  arma3: '0.50'
examples:
- <sqf>_locSize = size myLocation;</sqf>
see_also:
- setSize
