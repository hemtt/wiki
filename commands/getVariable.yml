name: getVariable
desc: "Returns the value of variable in the variable space assigned to various data types.\nAll available data types combinations:\n{{{!}} class=\"wikitable\"\n!colspan=\"2\"{{!}}Primary syntax ([[String]]) !! colspan=\"2\"{{!}}Alternative syntax ([[Array]])\n{{!}}-\n{{!}}'''Code'''\n{{!}}'''Since'''\n{{!}}'''Code'''\n{{!}}'''Since'''\n{{!}}-\n{{!}} [[Namespace]] getVariable [[String]] {{!}}{{!}} - {{!}}{{!}} [[Namespace]] getVariable [[Array]] {{!}}{{!}} {{arma2oa}} v1.60\n{{!}}-\n{{!}} [[Object]] getVariable [[String]] {{!}}{{!}} - {{!}}{{!}} [[Object]] getVariable [[Array]] {{!}}{{!}} - \n{{!}}-\n{{!}} [[Group]] getVariable [[String]] {{!}}{{!}} - {{!}}{{!}} [[Group]] getVariable [[Array]] {{!}}{{!}} -\n{{!}}-\n{{!}} [[Team Member]] getVariable [[String]] {{!}}{{!}} - {{!}}{{!}} [[Team Member]] getVariable [[Array]] {{!}}{{!}} - \n{{!}}-\n{{!}} [[Task]] getVariable [[String]] {{!}}{{!}} - {{!}}{{!}} [[Task]] getVariable [[Array]] {{!}}{{!}} {{arma3}} v1.68\n{{!}}-\n{{!}} [[Location]] getVariable [[String]] {{!}}{{!}} - {{!}}{{!}} [[Location]] getVariable [[Array]] {{!}}{{!}} {{arma3}} v1.68\n{{!}}-\n{{!}} [[Control]] getVariable [[String]] {{!}}{{!}} - {{!}}{{!}} [[Control]] getVariable [[Array]] {{!}}{{!}} {{arma3}} v1.56\n{{!}}-\n{{!}} [[Display]] getVariable [[String]] {{!}}{{!}} {{arma3}} v1.56 {{!}}{{!}} [[Display]] getVariable [[Array]] {{!}}{{!}} {{arma3}} v1.56\n{{!}}}\n\n{{Feature|important|When variable is [[setVariable|set]] on a [[Task]], it is not actually set on the task itself, but on the FSM attached to the task.<br>\nIf there is no FSM, [[getVariable]] will not work.}}\n{{Feature| arma3 | In the case of Alt Syntax usage in {{arma3}}, ''defaultValue'' will be returned if:\n* Requested variable is either undefined or [[nil]]\n* Variable namespace is null ([[objNull]], [[grpNull]], etc.)}}"
groups:
- Variables
- Namespaces
- Multiplayer
syntax:
- call: !Binary
  - varspace
  - name
  ret:
    type: Anything
    desc: or [[Nothing]] if the variable doesn't exist
  left: !Item
    name: varspace
    desc: ', [[Object]], [[Display]], [[Control]], [[Group]], [[Location]], [[Task]], [[Team Member]], [[Display]], [[Control]]'
    type: Namespace
  right: !Item
    name: name
    desc: variable name in given namespace
    type: String
- call: !Binary
  - varspace
  - - name
    - defaultValue
  ret:
    type: Anything
    desc: current value of the variable or ''defaultValue'' if the variable doesn't exist.
  left: !Item
    name: varspace
    desc: ', [[Object]], [[Display]], [[Control]], [[Group]], [[Location]], [[Task]], [[Team Member]], [[Display]], [[Control]]'
    type: Namespace
  right: !Array
  - !Item
    name: name
    desc: variable name in given namespace
    type: String
  - !Item
    name: defaultValue
    desc: value to return if variable doesn't exist {{Feature|warning|A dynamic ''defaultValue'' e.g <sqf inline>random 500</sqf> will always be executed, even if the variable is defined.}}
    type: Anything
argument_loc: Global
effect_loc: Unspecified
since:
  arma1: '1.00'
  arma2: '1.00'
  arma2oa: '1.50'
  tkoh: '1.00'
  arma3: '0.50'
examples:
- <sqf>private _variable = myTruck getVariable "myVariable"; // returns nil if "myVariable" is not set</sqf>
- <sqf>private _variable = myTruck getVariable ["myVariable", 50]; // returns 50 if "myVariable" is not set</sqf>
- "<sqf>\nfor \"_i\" from 0 to 5 do\n{\n\t_car = missionNamespace getVariable (\"car\" + str _i);\n\t_car setDamage 0;\n}; // Set damage of car0..car5 to 0\n</sqf>"
- |-
  <sqf>
  myMissionVar = 2015;
  missionNamespace getVariable "myMissionVar"; // returns 2015
  </sqf>
- "Get current value of a variable and if it is undefined, define it and get the defined value:\n<sqf>\nprivate _var = missionNamespace getVariable \"varName\";\nif (isNil \"_var\") then\n{\n\tmissionNamespace setVariable [\"varName\", 123];\n\t_var = 123;\n};\n// _var here will contain current value of the variable varName\n</sqf>"
see_also:
- setVariable
- allVariables
- getFSMVariable
