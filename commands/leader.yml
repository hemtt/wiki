name: leader
desc: Returns the group leader for the given '''unit''' or '''group'''. For dead units, [[objNull]] is returned.
groups:
- Groups
syntax:
- call: !Unary unitOrGroup
  ret:
    type: Object
  right: !Item
    name: unitOrGroup
    desc: or [[Group]]
    type: Object
argument_loc: Global
effect_loc: Unspecified
since:
  ofp: '1.00'
  ofpe: '1.00'
  arma1: '1.00'
  arma2: '1.00'
  arma2oa: '1.50'
  tkoh: '1.00'
  arma3: '0.50'
examples:
- <sqf>leader group player == leader player;</sqf>
- <sqf>leader group vehicle player;</sqf>
- <sqf>leader player;</sqf>
see_also:
- formationLeader
- formLeader
- isFormationLeader
- selectLeader
