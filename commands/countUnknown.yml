name: countUnknown
desc: Count how many units in the array are unknown to the given unit.
groups:
- Sides
syntax:
- call: !Binary
  - unit
  - others
  ret:
    type: Number
  left: !Item
    name: unit
    type: Object
  right: !Item
    name: others
    type: !ArrayUnsized
      value: Object
argument_loc: Global
effect_loc: Unspecified
since:
  ofp: '1.00'
  ofpe: '1.00'
  arma1: '1.00'
  arma2: '1.00'
  arma2oa: '1.50'
  tkoh: '1.00'
  arma3: '0.50'
examples:
- <sqf>_num = player countUnknown list _triggerOne;</sqf>
see_also:
- countFriendly
- countEnemy
- count
- countSide
- countType
