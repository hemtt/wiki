name: unassignItem
desc: Unassigns existing item and tries to put it into inventory. If there is no space in inventory the item simply disappears. See also [[unlinkItem]].
groups:
- Unit Inventory
syntax:
- call: !Binary
  - unit
  - item
  ret:
    type: Nothing
  left: !Item
    name: unit
    type: Object
  right: !Item
    name: item
    type: String
argument_loc: Global
effect_loc: Global
since: {}
examples:
- |-
  <sqf>
  _bluforUnit unassignItem "NVGoggles";
  _bluforUnit removeItem "NVGoggles";
  _opforUnit unassignItem "NVGoggles_OPFOR";
  _opforUnit removeItem "NVGoggles_OPFOR";
  _independentUnit unassignItem "NVGoggles_INDEP";
  _independentUnit removeItem "NVGoggles_INDEP";
  </sqf>
- "<sqf>\n{\n\t_x unassignItem hmd _x; // unassign (not remove) NVGs from all units\n} forEach allUnits;\n</sqf>"
see_also:
- assignItem
- addItem
- removeItem
- linkItem
- unlinkItem
- assignedItems
- removeAllAssignedItems
