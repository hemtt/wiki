name: format
desc: |-
  Composes a string containing other variables or other variable types. Converts any variable type to a string.

  {{Feature|important|
  * To convert a string back to a number, see [[parseNumber]].
  * [[joinString]] can be a bit faster, without string length limitation.
  }}

  {{Feature|informative|
  * the maximum length of the string is 8,388,608 characters (was ''8191'' before)
  * two consecutive percent symbols will be formatted to a single percent symbol in the final string (see {{Link|#Example 3}})
  Since {{GVI|arma3|2.18|size= 0.75}}
  }}
groups:
- Strings
syntax:
- call: !Unary
  - formatString
  - varN
  ret:
    type: String
    desc: the full string (up to 8kb, see above) is returned.
  right: !Array
  - !Item
    name: formatString
    desc: a string containing text and/or references to the variables listed below in the array. The references appear in the form of %1, %2 etc.
    type: String
  - !Infinite
    - !Item
      name: varN
      desc: variable referenced by %N
      type: Anything
argument_loc: Unspecified
effect_loc: Unspecified
since: {}
examples:
- <sqf>format ["Player:%1, player's side:%2", player, side player]; // returns "Player:WEST 1-1-A:1 (Username), player's side:WEST"</sqf>
- "<sqf>\nplayer addEventHandler [\"HandleDamage\", {\n\thint format [\"You just sustained %1%2 damage!\", ceil ((_this select 2) * 100), \"%\"];\n}]; // Shows \"You just sustained 20% damage!\"\n</sqf>"
- "<sqf>\n// Since {{arma3}} v2.18 two consecutive percent symbols will be formatted to a single percent symbol in the final string (%% -> %)\nplayer addEventHandler [\"HandleDamage\", {\n\thint format [\"You just sustained %1%% damage!\", ceil ((_this select 2) * 100)];\n}]; // Shows \"You just sustained 20% damage!\"\n</sqf>"
see_also:
- formatText
- endl
- str
- toString
- joinString
