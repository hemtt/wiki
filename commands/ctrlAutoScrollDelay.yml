name: ctrlAutoScrollDelay
desc: "Returns number of seconds auto-scroll will wait before scroll and/or rewind. -2 if scrollbar not present. \n<br><br>\nAutorscroll is available for [[DialogControls-ListBoxes|CT_LISTBOX]] and [[CT_CONTROLS_GROUP]] types of controls only. Autoscroll will wait [[ctrlAutoScrollDelay]] seconds (must be  > 0) and then will scroll the scroll bar down to the bottom. [[ctrlAutoScrollSpeed]] defines the speed with which scrollbar is scrolled. If [[ctrlAutoScrollRewind]] is [[true]], the control will fade out, immediately rewind to the top, then fade in, wait [[ctrlAutoScrollDelay]] seconds and then repeat the scrolling in a loop. If user focuses on the control, autoscrolling is interrupted."
groups:
- GUI Control
- GUI Control - ListBox
- GUI Control - ListNBox
syntax:
- call: !Unary control
  ret:
    type: Number
  right: !Item
    name: control
    desc: '[[DialogControls-ListBoxes|CT_LISTBOX]] or [[CT_CONTROLS_GROUP]]'
    type: Control
argument_loc: Unspecified
effect_loc: Unspecified
since: {}
examples:
- <sqf>_ctrlDelay = ctrlAutoScrollDelay _ctrlGroup;</sqf>
see_also:
- ctrlSetAutoScrollSpeed
- ctrlAutoScrollSpeed
- ctrlSetAutoScrollDelay
- ctrlSetAutoScrollRewind
- ctrlAutoScrollRewind
