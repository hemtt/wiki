name: nearObjectsReady
desc: Check whether all data are loaded to nearObjects will return in reasonable time.
groups:
- Object Detection
syntax:
- call: !Binary
  - position
  - radius
  ret:
    type: Boolean
  left: !Item
    name: position
    desc: or [[Position#PositionAGL|PositionAGL]] or [[Position#Introduction|Position2D]]
    type: Object
  right: !Item
    name: radius
    type: Number
argument_loc: Unspecified
effect_loc: Unspecified
since:
  arma2: '1.00'
  arma2oa: '1.50'
  tkoh: '1.00'
  arma3: '0.50'
examples:
- <sqf>_twnpos nearObjectsReady 500; //from ALICE</sqf>
see_also:
- findNearestEnemy
- nearestBuilding
- nearestObject
- nearestObjects
- nearObjects
- nearestLocation
- nearEntities
- nearTargets
- nearSupplies
- nearestLocationWithDubbing
- nearRoads
- nearestMines
