name: move
desc: Let group move to given position. Active waypoints will be ignored when command is used.
groups:
- Unit Control
syntax:
- call: !Binary
  - group
  - position
  ret:
    type: Nothing
  left: !Item
    name: group
    desc: or [[Group]]
    type: Object
  right: !Item
    name: position
    desc: or [[Position#PositionATL|PositionATL]]
    type: Position2d
argument_loc: Local
effect_loc: Global
since: {}
examples:
- <sqf>_groupOne move position player;</sqf>
see_also:
- doMove
- commandMove
- addWaypoint
