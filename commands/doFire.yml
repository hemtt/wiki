name: doFire
desc: |-
  Order the given unit(s) to fire on the given target (without radio messages).

  The target is set with [[doTarget]] or [[commandTarget]].

  The target can be a unit or a vehicle, but not an object.
groups:
- Unit Control
syntax:
- call: !Binary
  - unit
  - target
  ret:
    type: Nothing
  left: !Item
    name: unit
    desc: or [[Array]] of [[Object]]s
    type: Object
  right: !Item
    name: target
    type: Object
argument_loc: Local
effect_loc: Global
since:
  ofp: '1.00'
  ofpe: '1.00'
  arma1: '1.00'
  arma2: '1.00'
  arma2oa: '1.50'
  tkoh: '1.00'
  arma3: '0.50'
examples:
- <sqf>_ESoldier1 doFire _WSoldier1;</sqf>
see_also:
- fire
- commandFire
- canFire
- fireAtTarget
- forceWeaponFire
- commandArtilleryFire
- commandSuppressiveFire
- doArtilleryFire
- doSuppressiveFire
- isManualFire
