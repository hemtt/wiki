name: showCompass
desc: Shows or hides the compass on the map screen, if enabled for the mission and you possess the item. (default [[true]])
groups:
- Interaction
syntax:
- call: !Unary show
  ret:
    type: Nothing
  right: !Item
    name: show
    type: Boolean
argument_loc: Unspecified
effect_loc: Unspecified
since:
  ofp: '1.00'
  ofpe: '1.00'
  arma1: '1.00'
  arma2: '1.00'
  arma2oa: '1.50'
  tkoh: '1.00'
  arma3: '0.50'
examples:
- <sqf>showCompass false;</sqf>
see_also:
- shownCompass
- visibleCompass
- showGPS
- showRadio
- showWatch
- showPad
- showMap
