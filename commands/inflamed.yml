name: inflamed
desc: Checks if fireplace is inflamed (burning) or not. To check if a unit is receiving damage from fire, use [[isBurning]] command.
groups:
- Object Manipulation
syntax:
- call: !Unary fireplace
  ret:
    type: Boolean
  right: !Item
    name: fireplace
    type: Object
argument_loc: Global
effect_loc: Unspecified
since:
  ofp: '1.04'
  ofpe: '1.00'
  arma1: '1.00'
  arma2: '1.00'
  arma2oa: '1.50'
  tkoh: '1.00'
  arma3: '0.50'
examples:
- <sqf>_inflamed = inflamed _fireplaceOne;</sqf>
see_also:
- inflame
- isBurning
