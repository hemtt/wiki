name: productVersion
desc: |-
  Returns the product's friendly name, identifier, version and build number.
  {{Feature|arma3|The command has been upgraded to also returns branch identifier, whether or not the game was launched using mods, the platform and the architecture.}}
groups:
- System
syntax:
- call: Nular
  ret:
    type: !ArraySized
    - name: name
      type: String
      default: null
      desc: product name
      since: null
    - name: nameShort
      type: String
      default: null
      desc: product short name
      since: null
    - name: version
      type: Number
      default: null
      desc: product version number
      since: null
    - name: buildNumber
      type: Number
      default: null
      desc: product build number
      since: null
    - name: buildType
      type: String
      default: null
      desc: build type, can be {{hl|"Stable"}}, {{hl|"Development"}}, {{hl|"Diag"}} or {{hl|"Profile"}}
      since:
        arma3: '1.00'
    - name: isModded
      type: Boolean
      default: null
      desc: is the product running with mods ([[true]]) or vanilla ([[false]])
      since:
        arma3: '1.00'
    - name: platform
      type: String
      default: null
      desc: can be {{hl|"Windows"}}, {{hl|"Linux"}} or {{hl|"OSX"}}
      since:
        arma3: '1.00'
    - name: architecture
      type: String
      default: null
      desc: '{{hl|"x64"}} for 64bit or {{hl|"x86"}} for 32bit'
      since:
        arma3: '1.68'
    - name: steamBranchName
      type: String
      default: null
      desc: '{{hl|""}} (for default/public branch), {{hl|"profiling"}} or {{hl|"development"}}'
      since:
        arma3: '2.20'
argument_loc: Unspecified
effect_loc: Unspecified
since:
  arma2oa: '1.62'
  tkoh: '1.00'
  arma3: '0.50'
examples:
- <sqf>hint str productVersion; // would return ["Arma 2 OA", "arma2oa", 162, 95208] on Arma 2 OA 1.62.95208</sqf>
- <sqf>hint str productVersion; // ["Arma 3", "Arma3", 137, 128764, "Development", false, "Windows"]</sqf>
- '<sqf>format ["%1.%2", (productVersion select 2) * 0.01 toFixed 2, productVersion select 3]; // returns version e.g.: "2.00.146773"</sqf>'
- <sqf>productVersion params ["_name", "_nameShort", "_version", "_buildNumber", "_buildType", "_isModded", "_platform", "_architecture", "_steamBranchName"];</sqf>
see_also:
- supportInfo
- requiredVersion
