name: inflame
desc: Sets the state of a fireplace.
groups:
- Object Manipulation
syntax:
- call: !Binary
  - fireplace
  - burn
  ret:
    type: Nothing
  left: !Item
    name: fireplace
    type: Object
  right: !Item
    name: burn
    desc: '[[true]] to let it burn, [[false]] to extinguish it.'
    type: Boolean
argument_loc: Global
effect_loc: Global
since:
  ofp: '1.00'
  ofpe: '1.00'
  arma1: '1.00'
  arma2: '1.00'
  arma2oa: '1.50'
  tkoh: '1.00'
  arma3: '0.50'
examples:
- <sqf>_fireplaceOne inflame true;</sqf>
see_also:
- inflamed
