name: systemTimeUTC
desc: Returns [[systemTime]] according to '''U'''niversal '''T'''ime '''C'''oordinated time scale.
groups:
- Time
syntax:
- call: Nular
  ret:
    type: !ArraySized
    - name: year
      type: Number
      default: null
      desc: null
      since: null
    - name: month
      type: Number
      default: null
      desc: null
      since: null
    - name: day
      type: Number
      default: null
      desc: null
      since: null
    - name: hour
      type: Number
      default: null
      desc: null
      since: null
    - name: minute
      type: Number
      default: null
      desc: null
      since: null
    - name: second
      type: Number
      default: null
      desc: null
      since: null
    - name: millisecond
      type: Number
      default: null
      desc: null
      since: null
argument_loc: Unspecified
effect_loc: Unspecified
since: {}
examples:
- <sqf>private _UKTime = systemTimeUTC;</sqf>
- <sqf>systemTimeUTC apply { if (_x < 10) then { "0" + str _x } else { str _x } }; // ["2021","05","03","14","09","37","593"]</sqf>
- "<sqf>\nprivate _timeUTC = systemTimeUTC;\nprivate _time = systemTime;\nprivate _timeDiffH = (_time select 3) - (_timeUTC select 3);\nprivate _timeDiffM = (_time select 4) - (_timeUTC select 4);\nif (_timeDiffM < 0) then\n{\n\t_timeDiffH = _timeDiffH - 1;\n\t_timeDiffM = _timeDiffM + 60;\n};\nif (_timeDiffH < -12) then\n{\n\t_timeDiffH = _timeDiffH + 24;\n};\nif (_timeDiffH > 12) then\n{\n\t_timeDiffH = _timeDiffH - 24;\n};\nprivate _timeZone = [_timeDiffH, _timeDiffM]; // hour (_timeDiffH) is in range -12..+12\n</sqf>"
see_also:
- systemTime
- date
- time
- dayTime
- diag_tickTime
- serverTime
- missionStart
- diag_deltaTime
