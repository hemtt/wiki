name: cameraView
desc: "Returns mode of active camera view. Mode is one of: \n* \"INTERNAL\" (1st person)\n* \"EXTERNAL\" (3rd person)\n* \"GUNNER\" (optics / sights)\n* \"GROUP\" (commander view)"
groups:
- Camera Control
syntax:
- call: Nular
  ret:
    type: String
argument_loc: Unspecified
effect_loc: Unspecified
since:
  arma2: '1.00'
  arma2oa: '1.50'
  tkoh: '1.00'
  arma3: '0.50'
examples:
- "<sqf>\nif (cameraOn == _vehicle && cameraView == \"EXTERNAL\") then\n{\n\t_vehicle switchCamera \"INTERNAL\";\n};\n</sqf>"
see_also:
- switchCamera
- cameraOn
- cameraEffect
