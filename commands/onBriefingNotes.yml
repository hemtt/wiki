name: onBriefingNotes
desc: Select a sound declared in the [[Description.ext#CfgSounds|Description.ext]] of the mission to be played the first time the [[Briefing.html#Notes|Notes tab]] is selected in the [[Briefing.html|briefing]].
groups:
- Sounds
- Briefing
- Event Handlers
syntax:
- call: !Unary soundName
  ret:
    type: Nothing
  right: !Item
    name: soundName
    type: String
argument_loc: Unspecified
effect_loc: Unspecified
since:
  ofp: '1.75'
  ofpe: '1.00'
  arma1: '1.00'
  arma2: '1.00'
  arma2oa: '1.50'
  tkoh: '1.00'
  arma3: '0.50'
examples:
- <sqf>onBriefingNotes "NotesVoiceOver";</sqf>
see_also:
- playSound
- '{{Link|Description.ext#CfgSounds}}'
