name: menuSize
desc: Returns how many sub entries is in item on given path.
groups:
- GUI Control - Menu
syntax:
- call: !Unary
  - idc
  - path
  ret:
    type: Number
  right: !Array
  - !Item
    name: idc
    type: Number
  - !Item
    name: path
    type: Path
- call: !Binary
  - control
  - path
  ret:
    type: Number
  left: !Item
    name: control
    type: Control
  right: !Item
    name: path
    type: Path
argument_loc: Unspecified
effect_loc: Unspecified
since: {}
examples:
- <sqf>findDisplay 313 displayCtrl 120 menuSize [];</sqf>
