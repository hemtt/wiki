name: getMarkerPos
desc: Returns marker position.
alias:
- '[[markerPos]]'
groups:
- Markers
syntax:
- call: !Unary markerName
  ret:
    type: Position3dAGL
    desc: format [x,y,0]
  right: !Item
    name: markerName
    type: String
- call: !Unary
  - markerName
  - preserveElevation
  ret:
    type: Position3dAGL
    desc: if ''preserveElevation'' is [[true]] or [x,y,0] if ''preserveElevation'' is [[false]]
  right: !Array
  - !Item
    name: markerName
    type: String
  - !Item
    name: preserveElevation
    desc: ''
    type: Boolean
    optional: true
    default: 'false'
  since:
    arma3: '1.94'
argument_loc: Unspecified
effect_loc: Local
since:
  ofp: '1.00'
  ofpe: '1.00'
  arma1: '1.00'
  arma2: '1.00'
  arma2oa: '1.50'
  tkoh: '1.00'
  arma3: '0.50'
examples:
- <sqf>_mPos1 = getMarkerPos "markerOne";</sqf>
- <sqf>_mPos2 = getMarkerPos ["markerTwo", true];</sqf>
see_also:
- setMarkerPos
- setMarkerPosLocal
