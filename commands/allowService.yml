name: allowService
desc: |-
  Sets which type of repair/refuel/rearm service is allowed. The two available types are manual, where the action is displayed to the user, and auto, where the service happens within distance.
  The engine default is both (manual and auto) for historic reasons.
groups:
- Object Manipulation
syntax:
- call: !Binary
  - vehicle
  - type
  ret:
    type: Nothing
  left: !Item
    name: vehicle
    desc: supply vehicle, i.e. ammo truck
    type: Object
  right: !Item
    name: type
    desc: '0: none, 1: auto, 2: manual, 3: both'
    type: Number
argument_loc: Local
effect_loc: Global
since:
  arma3: '2.12'
examples:
- <sqf>ammoTruck allowService 0;</sqf>
see_also:
- allowedService
- needService
