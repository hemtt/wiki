name: menuExpand
desc: Expands given menu entry on given path and all its parents so entry is visible.
groups:
- GUI Control - Menu
syntax:
- call: !Unary
  - idc
  - path
  ret:
    type: Nothing
  right: !Array
  - !Item
    name: idc
    type: Number
  - !Item
    name: path
    type: Path
- call: !Binary
  - control
  - path
  ret:
    type: Nothing
  left: !Item
    name: control
    type: Control
  right: !Item
    name: path
    type: Path
argument_loc: Unspecified
effect_loc: Unspecified
since: {}
examples:
- <sqf>findDisplay 313 displayCtrl 120 menuExpand [0, 1];</sqf>
see_also:
- menuCollapse
