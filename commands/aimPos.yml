name: aimPos
desc: Returns the position of the object other units can aim to.
groups:
- Positions
syntax:
- call: !Unary unit
  ret:
    type: Position3dASL
  right: !Item
    name: unit
    type: Object
argument_loc: Global
effect_loc: Unspecified
since:
  arma2oa: '1.62'
  tkoh: '1.00'
  arma3: '0.50'
examples:
- <sqf>_aimPos = aimPos player;</sqf>
- '''''''''''aimPosVisual'''''''''' equivalent:<sqf>private _aimPosVisual = AGLToASL unitAimPositionVisual player;</sqf>'
see_also:
- eyePos
- getPosASL
- weaponDirection
- unitAimPosition
- unitAimPositionVisual
