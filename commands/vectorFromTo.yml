name: vectorFromTo
desc: |-
  Unit vector, equal to direction from vector1 to vector2. In other words this command produces [[vectorNormalized | normalised vector]] between given 2 points.<br>
  To get a non-normalised vector, use [[vectorDiff]].
groups:
- Math - Vectors
syntax:
- call: !Binary
  - vector1
  - vector2
  ret:
    type: Vector3d
  left: !Item
    name: vector1
    desc: 3D or {{GVI|arma3|2.00|size= 0.75}} 2D vector (z coordinate is defaulted to 0)
    type: !ArrayUnsized
      value: !OneOf
      - type: Vector3d
        desc: null
        since: null
      - type: Vector2d
        desc: null
        since: null
  right: !Item
    name: vector2
    desc: 3D or {{GVI|arma3|2.00|size= 0.75}} 2D vector (z coordinate is defaulted to 0)
    type: !ArrayUnsized
      value: !OneOf
      - type: Vector3d
        desc: null
        since: null
      - type: Vector2d
        desc: null
        since: null
argument_loc: Unspecified
effect_loc: Unspecified
since: {}
examples:
- |-
  <sqf>
  [1,2,3] vectorFromTo [4,5,6];
  // is the same as
  vectorNormalized ([4,5,6] vectorDiff [1,2,3]);
  </sqf>
see_also:
- vectorDiff
- vectorCrossProduct
- vectorDotProduct
- vectorCos
- vectorMagnitude
- vectorMagnitudeSqr
- vectorMultiply
- vectorDistance
- vectorDistanceSqr
- vectorDir
- vectorUp
- setVectorDir
- setVectorUp
- setVectorDirAndUp
- vectorNormalized
