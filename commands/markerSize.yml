name: markerSize
desc: Returns marker size. This command is identical to [[getMarkerSize]].
groups:
- Markers
syntax:
- call: !Unary markerName
  ret:
    type: !ArraySized
    - name: a_axis
      type: Number
      default: null
      desc: 1/2 width of marker
      since: null
    - name: b_axis
      type: Number
      default: null
      desc: 1/2 height of marker
      since: null
  right: !Item
    name: markerName
    type: String
argument_loc: Global
effect_loc: Unspecified
since:
  ofp: '0.00'
  ofpe: '1.00'
  arma1: '1.00'
  arma2: '1.00'
  arma2oa: '1.50'
  tkoh: '1.00'
  arma3: '0.50'
examples:
- <sqf>_mSize = markerSize "Marker1";</sqf>
see_also:
- setMarkerSize
- setMarkerSizeLocal
