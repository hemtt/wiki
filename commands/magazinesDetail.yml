name: magazinesDetail
desc: "Returns an array of strings with description of all vehicle's magazines, their ammo count (current/default) and their ids for the primary gunner. \n\nWhen applied to a unit (soldier), the command behaves differently and will omit magazines already loaded into unit's weapons. Use [[currentMagazineDetail]] to get this information for a currently loaded magazine."
groups:
- Unit Inventory
- Vehicle Inventory
syntax:
- call: !Unary vehicle
  ret:
    type: !ArrayUnsized
      value: String
  right: !Item
    name: vehicle
    desc: unit or vehicle
    type: Object
- call: !Unary
  - vehicle
  - includeEmpty
  - includeLoaded
  ret:
    type: !ArrayUnsized
      value: String
  right: !Array
  - !Item
    name: vehicle
    desc: unit or vehicle
    type: Object
  - !Item
    name: includeEmpty
    desc: (Optional, default [[false]]) [[true]] to include empty magazines
    type: Boolean
  - !Item
    name: includeLoaded
    desc: (Optional, default [[false]]) [[true]] to include magazines loaded in weapons (Since Arma 3 v2.07.148195)
    type: Boolean
  since:
    arma3: '2.0'
argument_loc: Unspecified
effect_loc: Unspecified
since: {}
examples:
- "<sqf>\n_magazinesDetail = magazinesDetail player;\n/*\n[\n\t\"6.5 mm 30Rnd Sand Mag(30/30)[id/cr:10000003/0]\",\n\t\"Chemlight (Green)(1/1)[id/cr:10000020/0]\",\n\t\"6.5 mm 30Rnd Sand Mag(30/30)[id/cr:10000012/0]\",\n\t\"RGO Grenade(1/1)[id/cr:10000016/0]\",\n\t\"RGO Grenade(1/1)[id/cr:10000017/0]\",\n\t\"6.5 mm 30Rnd Sand Mag(30/30)[id/cr:10000070/0]\",\n\t\"PCML Missile(1/1)[id/cr:10000072/0]\",\n\t\"6.5 mm 30Rnd Sand Mag(30/30)[id/cr:10000001/0]\",\n\t\"9 mm 16Rnd Mag(16/16)[id/cr:10000013/0]\"\n]\n*/\n</sqf>"
- "<sqf>\n_magazinesDetail = magazinesDetail Mi_48;\n/*\n[\n\t\"30 mm HE Tracer (Green) Shells(250/250)[id/cr:10000043/0]\",\n\t\"30 mm APDS Tracer (Green) Shells(250/250)[id/cr:10000044/0]\",\n\t\"Designator Batteries(1/1)[id/cr:10000045/0]\",\n\t\"Scalpel 4x(4/4)[id/cr:10000049/0]\",\n\t\"Skyfire 19x(19/19)[id/cr:10000051/0]\",\n\t\"Skyfire 19x(19/19)[id/cr:10000052/0]\",\n\t\"Scalpel 4x(4/4)[id/cr:10000053/0]\"\n]\n*/\n</sqf>"
see_also:
- currentMagazineDetail
- magazines
- magazinesTurret
- magazinesAmmo
- magazinesAmmoFull
- magazinesDetailUniform
- magazinesDetailVest
- magazinesDetailBackpack
