name: setFuel
desc: Sets fuel level.
groups:
- Object Manipulation
syntax:
- call: !Binary
  - vehicle
  - amount
  ret:
    type: Nothing
  left: !Item
    name: vehicle
    type: Object
  right: !Item
    name: amount
    desc: in range 0..1
    type: Number
argument_loc: Local
effect_loc: Global
since:
  ofp: '1.00'
  ofpe: '1.00'
  arma1: '1.00'
  arma2: '1.00'
  arma2oa: '1.50'
  tkoh: '1.00'
  arma3: '0.50'
examples:
- <sqf>_jeepOne setFuel 0.5;</sqf>
see_also:
- fuel
- getFuelCargo
- setFuelCargo
- setHit
- setAmmo
