name: menuSetText
desc: Sets text of given menu strip entry.
groups:
- GUI Control - Menu
syntax:
- call: !Unary
  - idc
  - path
  - text
  ret:
    type: Nothing
  right: !Array
  - !Item
    name: idc
    type: Number
  - !Item
    name: path
    type: Path
  - !Item
    name: text
    type: String
- call: !Binary
  - control
  - - path
    - text
  ret:
    type: Nothing
  left: !Item
    name: control
    type: Control
  right: !Array
  - !Item
    name: path
    type: Path
  - !Item
    name: text
    type: String
argument_loc: Unspecified
effect_loc: Unspecified
since: {}
examples:
- <sqf>_ctrlMenuStrip menuSetText [[0,0,1], "Hello World!"];</sqf>
see_also:
- menuText
