name: selectRandomWeighted
desc: "Returns a random element from the given array according to assigned weights. Engine solution to [[BIS_fnc_selectRandomWeighted]]. A few notes:\n* Negative weights are not supported\n* If an item's weight is 0, the item is ignored\n* The weights don't have to total to 1 \n* If numbers of items and weights do not match, the shortest array is used\n* A single array Syntax is slightly faster than Alt Syntax"
groups:
- Arrays
syntax:
- call: !Unary valuesAndWeights
  ret:
    type: Anything
    desc: random weighted value or [[Nothing]] if array is empty or all weights are 0
  right: !Item
    name: valuesAndWeights
    type: !ArraySized
    - name: valueN
      type: Anything
      desc: weighted value
      since: null
    - name: weightN
      type: Number
      desc: values relative weight
      since: null
- call: !Binary
  - values
  - weights
  ret:
    type: Anything
    desc: random weighted value or [[Nothing]] if any of arrays is empty or all weights are 0
  left: !Item
    name: values
    type: !ArrayUnsized
      value: Anything
  right: !Item
    name: weights
    type: !ArrayUnsized
      value: Number
argument_loc: Unspecified
effect_loc: Unspecified
since: {}
examples:
- <sqf>private _randomWeightedElement = selectRandomWeighted [1,0.1,2,0.2,3,1.3,4,2.4,5,7.5];</sqf>
- <sqf>private _randomWeightedElement = [1,2,3,4,5] selectRandomWeighted [0.1,0.2,1.3,2.4,7.5];</sqf>
see_also:
- random
- select
- selectRandom
- selectMin
- selectMax
