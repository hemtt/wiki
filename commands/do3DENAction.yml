name: do3DENAction
desc: |-
  Performs given [[Eden Editor: Actions|Eden Editor action]].
  {{Feature|warning|
  Prior to {{GVI|arma3|2.12|size= 0.75}} it was possible to use this command outside of [[:Category:Eden Editor|Eden Editor]].<br>
  For example <sqf inline>do3DENAction "MissionSave";</sqf> would wipe the [[mission.sqm]] without a way to restore it when executed accidentally during preview.
  }}
groups:
- Eden Editor
syntax:
- call: !Unary action
  ret:
    type: Nothing
  right: !Item
    name: action
    desc: 'see [[Eden Editor: Actions]]'
    type: String
  since:
    arma3: '2.22'
- call: !Unary
  - action
  - argument
  ret:
    type: Nothing
  right: !Array
  - !Item
    name: action
    desc: 'see [[Eden Editor: Actions]]'
    type: String
  - !Item
    name: argument
    desc: 'depends on the used [[Eden Editor: Actions|action]]'
    type: Anything
argument_loc: Unspecified
effect_loc: Unspecified
since: {}
examples:
- <sqf>do3DENAction "MissionSave";</sqf>
- |-
  <sqf>
  // Since 2.22
  private _par = createHashMap;
  _par set ["name", "testfile"];
  _par set ["folder", "subfolder"];
  _par set ["content", "R3voing"];

  do3DENAction ["CreateTextFile", _par];
  </sqf>
see_also:
- get3DENActionState
