name: synchronizedWaypoints
desc: Returns the list of waypoints synchronized with a given trigger or waypoint.
groups:
- Waypoints
- Triggers
syntax:
- call: !Unary obj
  ret:
    type: !ArrayUnsized
      value: Waypoint
  right: !Item
    name: obj
    desc: or [[Waypoint]]
    type: Object
argument_loc: Unspecified
effect_loc: Unspecified
since: {}
examples:
- <sqf>synchronizedWaypoints _someTrigger;</sqf>
see_also:
- synchronizeWaypoint
