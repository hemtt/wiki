name: ':'
desc: See [[switch]]
groups:
- Program Flow
syntax:
- call: !Binary
  - a
  - b
  ret:
    type: Nothing
  left: !Item
    name: a
    type: SwitchType
  right: !Item
    name: b
    type: Code
argument_loc: Unspecified
effect_loc: Unspecified
since: {}
examples:
- '<sqs>? (_var == _test) : hint "_var is equal to _test!";</sqs>'
- "<sqf>\nswitch (_condition) do\n{\n\tcase 1: { hint \"1\" };\n\tcase 2: { hint \"2\" };\n\tdefault { hint \"default\" }; // note: NO colon for the default case\n};\n</sqf>"
see_also:
- Control
- Structures
- switch
