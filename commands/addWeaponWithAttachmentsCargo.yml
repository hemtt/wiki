name: addWeaponWithAttachmentsCargo
desc: Adds a weapon into the cargo space of a vehicle / box with given attachments / magazines. Ignores available cargo space. If the weapon class has any pre-attached items (LinkedItems), they are removed and new items, supplied via command arguments, are added.
groups:
- Vehicle Inventory
syntax:
- call: !Binary
  - container
  - - weaponConfiguration
    - weaponsCount
  ret:
    type: Nothing
  left: !Item
    name: container
    desc: container to add the weapon to. Might be a backpack, ammobox or vehicle.
    type: Object
  right: !Array
  - !Item
    name: weaponConfiguration
    type: !ArraySized
    - name: weapon
      type: String
      default: null
      desc: Weapon class name from [[:Category:CfgWeapons|CfgWeapons]]
      since: null
    - name: muzzle
      type: String
      default: null
      desc: Muzzle attachment class name. Use "" if not needed.
      since: null
    - name: flashlight
      type: String
      default: null
      desc: Side rail attachment class name. Use "" if not needed.
      since: null
    - name: optics
      type: String
      default: null
      desc: Top rail attachment class name. Use "" if not needed.
      since: null
    - name: primaryMuzzle
      type: !ArraySized
      - name: primaryMuzzleMagazine
        type: String
        default: null
        desc: Magazine class name
        since: null
      - name: primaryAmmoCount
        type: Number
        default: null
        desc: Ammo count in magazine (will be clipped to values between 0 and the maximum capacity of the magazine class)
        since: null
      default: null
      desc: Use [] if not needed
      since: null
    - name: secondaryMuzzle
      type: !ArraySized
      - name: secondaryMuzzleMagazine
        type: String
        default: null
        desc: Magazine class name
        since: null
      - name: secondaryAmmoCount
        type: Number
        default: null
        desc: Ammo count in magazine (will be clipped to values between 0 and the maximum capacity of the magazine class)
        since: null
      default: null
      desc: Use [] if not needed
      since: null
    - name: bipod
      type: String
      default: null
      desc: Underbarrel rail attachment class name. Use "" if not needed.
      since: null
  - !Item
    name: weaponsCount
    desc: number of weapons to add
    type: Number
argument_loc: Global
effect_loc: Local
since: {}
examples:
- <sqf>cursorObject addWeaponWithAttachmentsCargo [["arifle_MX_GL_F", "muzzle_snds_H", "", "optic_aco", ["30Rnd_65x39_caseless_mag", 15], ["3Rnd_HE_Grenade_shell", 2], ""], 2];</sqf>
- |-
  Add five MX GL rifles, each with flashlight side attachment, a full 30 rounds magazine loaded into the gun and a full 3Rnd HE grenade magazine loaded into the grenade launcher:
  <sqf>cursorObject addWeaponWithAttachmentsCargo [["arifle_MX_GL_F", "", "acc_flashlight", "", ["30Rnd_65x39_caseless_mag", 30], ["3Rnd_HE_Grenade_shell", 2], ""], 5];</sqf>
- |-
  Add one MX rifle without any attachments or magazines event though the class has linked items:
  <sqf>cursorObject addWeaponWithAttachmentsCargo [["arifle_MX_Holo_pointer_F", "", "", "", [], [], ""], 1];</sqf>
- |-
  Add all weapons on player with attachments:
  <sqf>{ cursorObject addWeaponWithAttachmentsCargo [_x, 1] } forEach weaponsItems player;</sqf>
see_also:
- addWeaponWithAttachmentsCargoGlobal
- weaponsItems
- addWeaponCargo
- addWeaponCargoGlobal
- clearWeaponCargo
- getWeaponCargo
