name: needReload
desc: Returns how much vehicle wants to reload its weapons.
groups:
- Weapons
syntax:
- call: !Unary entity
  ret:
    type: Number
    desc: 'range: 0-1, 0: full mag, 1: empty mag'
  right: !Item
    name: entity
    desc: unit or vehicle
    type: Object
- call: !Binary
  - entity
  - muzzle
  ret:
    type: Number
    desc: 'range: 0-1, 0: full mag, 1: empty mag'
  left: !Item
    name: entity
    desc: unit or vehicle
    type: Object
  right: !Item
    name: muzzle
    desc: muzzle to check. "" to check all muzzles
    type: String
  since:
    arma3: '2.22'
argument_loc: Unspecified
effect_loc: Unspecified
since: {}
examples:
- <sqf>_seriousness = needReload _vehicle;</sqf>
- <sqf>if (needReload player == 1) then { reload player };</sqf>
- <sqf>player needReload currentMuzzle player;</sqf>
see_also:
- needService
- reload
- reloadEnabled
- enableReload
