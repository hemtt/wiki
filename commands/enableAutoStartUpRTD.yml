name: enableAutoStartUpRTD
desc: |-
  Toggle availability of the automated helicopter start-up and shutdown sequences.
  {{Feature|afm}}
groups:
- RTD
syntax:
- call: !Binary
  - helicopterRTD
  - enable
  ret:
    type: Nothing
  left: !Item
    name: helicopterRTD
    desc: helicopter
    type: Object
  right: !Item
    name: enable
    desc: enable or disable
    type: Boolean
argument_loc: Unspecified
effect_loc: Unspecified
since: {}
examples:
- <sqf>myHelicopterRTD enableAutoStartUpRTD true;</sqf>
see_also:
- isAutoStartUpEnabledRTD
