name: markerType
desc: Gets type of marker. See [[CfgMarkers]] for a list of standard markers.
alias:
- '[[getMarkerType]]'
groups:
- Markers
syntax:
- call: !Unary markerName
  ret:
    type: String
    desc: marker class name. See [[CfgMarkers]].
  right: !Item
    name: markerName
    type: String
argument_loc: Global
effect_loc: Unspecified
since:
  ofp: '0.00'
  ofpe: '1.00'
  arma1: '1.00'
  arma2: '1.00'
  arma2oa: '1.50'
  tkoh: '1.00'
  arma3: '0.50'
examples:
- <sqf>if (markerType "Marker1" == "") then { hint "Marker1 is not an icon!" };</sqf>
see_also:
- setMarkerType
- setMarkerTypeLocal
