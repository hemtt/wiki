name: angularVelocity
desc: Gets the angular velocity of the object in world space as a 3D vector. The units are in Rad/s (radians per second) and rotations are clockwise.
groups:
- Object Manipulation
syntax:
- call: !Unary obj
  ret:
    type: Vector3d
    desc: angular velocity of the object in world space ([0,0,0] if angular velocity is not supported by the object)
  right: !Item
    name: obj
    type: Object
argument_loc: Global
effect_loc: Unspecified
since: {}
examples:
- <sqf>angularVelocity myHeli; // [0.01, 0.03, 0.95]</sqf>
see_also:
- velocity
- setAngularVelocity
- angularVelocityModelSpace
