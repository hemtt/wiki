name: setRepairCargo
desc: |-
  Set amount of repair resources in cargo space of repair vehicle.
  Amount 1 is full cargo.
groups:
- Vehicle Inventory
syntax:
- call: !Binary
  - vehicleName
  - amount
  ret:
    type: Nothing
  left: !Item
    name: vehicleName
    type: Object
  right: !Item
    name: amount
    desc: in range 0..1
    type: Number
argument_loc: Local
effect_loc: Global
since:
  ofp: '1.00'
  ofpe: '1.00'
  arma1: '1.00'
  arma2: '1.00'
  arma2oa: '1.50'
  tkoh: '1.00'
  arma3: '0.50'
examples:
- <sqf>_repairTruck1 setRepairCargo 0;</sqf>
see_also:
- getRepairCargo
- setAmmoCargo
- setFuelCargo
