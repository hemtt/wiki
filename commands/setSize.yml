name: setSize
desc: |-
  Sets the size (radius)  of a location.

  The width  is 2 * x, the height is 2 * y.
groups:
- Locations
syntax:
- call: !Binary
  - location
  - - x
    - y
  ret:
    type: Nothing
  left: !Item
    name: location
    type: Location
  right: !Array
  - !Item
    name: x
    type: Number
  - !Item
    name: y
    type: Number
argument_loc: Unspecified
effect_loc: Unspecified
since: {}
examples:
- <sqf>myLocation setSize [10,30];</sqf>
see_also:
- size
