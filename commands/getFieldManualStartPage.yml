name: getFieldManualStartPage
desc: Returns array of the starting topic and hint the given field manual should display.
groups:
- System
syntax:
- call: !Unary display
  ret:
    type: !ArraySized
    - name: startingTopic
      type: String
      default: null
      desc: null
      since: null
    - name: hint
      type: String
      default: null
      desc: null
      since: null
  right: !Item
    name: display
    type: Display
argument_loc: Unspecified
effect_loc: Unspecified
since: {}
examples:
- <sqf>getFieldManualStartPage (findDisplay 46); // returns ["", ""]</sqf>
see_also:
- :Category:Arma
- '3:'
- Field
- Manual|Arma
- '3:'
- Field
- Manual
