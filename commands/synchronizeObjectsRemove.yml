name: synchronizeObjectsRemove
desc: Removes given objects from the unit's list of synchronized objects.
groups:
- Object Manipulation
syntax:
- call: !Binary
  - unit
  - objects
  ret:
    type: Nothing
  left: !Item
    name: unit
    type: Object
  right: !Item
    name: objects
    type: !ArrayUnsized
      value: Object
argument_loc: Global
effect_loc: Global
since:
  arma2: '1.00'
  arma2oa: '1.50'
  tkoh: '1.00'
  arma3: '0.50'
examples:
- <sqf>player synchronizeObjectsRemove [_object1, _object2, _object3];</sqf>
see_also:
- synchronizeObjectsAdd
