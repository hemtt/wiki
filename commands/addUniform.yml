name: addUniform
desc: |-
  Create a new uniform and try to link it into uniform slot (given uniform has to be supported by allowedUniforms list of target soldier).
  {{Feature | informative | To check if a uniform is allowed use [[isUniformAllowed]], and to force an incompatible uniform use [[forceAddUniform]].}}
groups:
- Unit Inventory
syntax:
- call: !Binary
  - unit
  - type
  ret:
    type: Nothing
  left: !Item
    name: unit
    type: Object
  right: !Item
    name: type
    type: String
argument_loc: Global
effect_loc: Global
since: {}
examples:
- <sqf>_unit addUniform "U_B_CombatUniform_mcam";</sqf>
see_also:
- forceAddUniform
- isUniformAllowed
- removeUniform
- uniform
