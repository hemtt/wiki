name: setFuelCargo
desc: Sets fuel amount in cargo space of refuel vehicles. Note that the carrying capacity of each side's refuel trucks differ.
groups:
- Vehicle Inventory
syntax:
- call: !Binary
  - vehicle
  - amount
  ret:
    type: Nothing
  left: !Item
    name: vehicle
    type: Object
  right: !Item
    name: amount
    desc: in range 0..1
    type: Number
argument_loc: Local
effect_loc: Global
since:
  ofp: '1.00'
  ofpe: '1.00'
  arma1: '1.00'
  arma2: '1.00'
  arma2oa: '1.50'
  tkoh: '1.00'
  arma3: '0.50'
examples:
- <sqf>_refuelTruck setFuelCargo 0;</sqf>
see_also:
- getFuelCargo
- fuel
- setFuel
- setAmmoCargo
- setRepairCargo
