name: getObjectFOV
desc: |-
  Returns Field of View of the given object in [[rad]]ians. Static objects return default value, which is 1.
  FOV of [[objNull]] is 0.
  Object FOV is indirectly connected with optics magnification or player view zoom, the narrower the angle the greater the zoom.
  {{Feature|informative|The FOV returned by this command doesn't change if user has custom FOV set in profile. Use it in combination with [[getResolution]] to adjust for the difference if required.}}
groups:
- Object Manipulation
syntax:
- call: !Unary object
  ret:
    type: Number
    desc: FOV in [[rad]]ians
  right: !Item
    name: object
    desc: for units it queries unit weapon optics/zoom, for vehicles - vehicle optics/zoom
    type: Object
argument_loc: Unspecified
effect_loc: Unspecified
since:
  arma3: '1.96'
examples:
- <sqf>private _objFOV = getObjectFOV player;</sqf>
- <sqf>private _objFOVinDegrees = deg getObjectFOV cursorObject;</sqf>
- |-
  Perceived distance to an object:
  <sqf>private _vdist = (player distance _obj) * (getObjectFOV player / 0.75);</sqf>
see_also:
- getObjectType
- getResolution
