name: waypointPosition
desc: Get provided waypoint's position.
alias:
- '[[getWPPos]]'
groups:
- Waypoints
syntax:
- call: !Unary
  - groupOrUnit
  - index
  ret:
    type: Position3dAGL
  right: !Array
  - !Item
    name: groupOrUnit
    desc: or [[Object]]
    type: Group
  - !Item
    name: index
    type: Number
argument_loc: Unspecified
effect_loc: Unspecified
since:
  ofp: '0.00'
  ofpe: '1.00'
  arma1: '1.00'
  arma2: '1.00'
  arma2oa: '1.50'
  tkoh: '1.00'
  arma3: '0.50'
examples:
- <sqf>_wPos = waypointPosition [_groupOne, 1];</sqf>
see_also:
- waypoints
- setWaypointPosition
- waypointHousePosition
- setWPPos
