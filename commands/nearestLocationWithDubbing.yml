name: nearestLocationWithDubbing
desc: |-
  Find the nearest location having a non-empty speech.
  {{Feature|arma3|No locations are dubbed in {{arma3}}.}}
groups:
- Locations
syntax:
- call: !Unary position
  ret:
    type: Location
  right: !Item
    name: position
    desc: or [[Position#PositionAGL|PositionAGL]] or [[Position#Introduction|Position2D]]
    type: Object
argument_loc: Unspecified
effect_loc: Unspecified
since: {}
examples:
- <sqf>_location = nearestLocationWithDubbing player;</sqf>
- <sqf>_location = nearestLocationWithDubbing getMarkerPos "myMarker";</sqf>
see_also:
- findNearestEnemy
- nearestBuilding
- nearestObject
- nearestObjects
- nearObjects
- nearestLocation
- nearEntities
- nearTargets
- nearSupplies
- nearObjectsReady
- nearRoads
- nearestMines
