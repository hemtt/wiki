name: animationState
desc: |-
  Returns the name of a unit's current primary animation. Seems to be forced to lower case in {{arma3}}.
  {{Feature|informative| Up until {{GVI|arma3|2.20}} this command only worked for a man unit, and other units such as animals couldn't use this command. As of {{GVI|arma3|2.22}} animals are supported as well. }}
multiplayer_note: When executed on a client, this command only returns accurate results when the target unit is within sight of the client. When executed on a dedicated server, the returned value is accurate.
groups:
- Animations
syntax:
- call: !Unary unitName
  ret:
    type: String
  right: !Item
    name: unitName
    type: Object
argument_loc: Global
effect_loc: Unspecified
since: {}
examples:
- <sqf>_state = animationState player;</sqf>
see_also:
- gestureState
- switchMove
- playMove
- pose
- BIS_fnc_ambientAnimGetParams
- getUnitMovesInfo
