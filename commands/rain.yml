name: rain
desc: Returns the current value of rain density.
multiplayer_note: Pre-{{arma3}}, each client and the server could have different rain values. Since {{arma3}} the value is synced over network.
groups:
- Environment
syntax:
- call: Nular
  ret:
    type: Number
    desc: in range 0..1
argument_loc: Unspecified
effect_loc: Unspecified
since:
  arma1: '1.00'
  arma2: '1.00'
  arma2oa: '1.50'
  tkoh: '1.00'
  arma3: '0.50'
examples:
- <sqf>_rainLevel = rain;</sqf>
see_also:
- setRain
- fog
