name: ctrlSetText
desc: |-
  Sets the text of a control of the currently active user dialog or display.
  This command can be used for static texts, buttons, edit lines and active texts as well as for images, where you can use it to set the image path.
  <br>
  Read [[Arma: GUI Configuration]] for more information about user dialogs and controls.<br>
  Use [[endl]] to insert line breaks.

  Since {{GVI|arma3|2.06|size= 0.75}} supported control types are:
  {{Columns|4|
  * [[CT_STATIC]]
  * [[CT_EDIT]]
  * [[CT_XKEYDESC]]
  * [[CT_XBUTTON]]
  * [[CT_SHORTCUTBUTTON]]
  * [[CT_STRUCTURED_TEXT]]
  * [[CT_BUTTON]]
  * [[CT_ACTIVETEXT]]
  }}
groups:
- GUI Control
syntax:
- call: !Unary
  - idc
  - text
  ret:
    type: Nothing
  right: !Array
  - !Item
    name: idc
    desc: control IDC
    type: Number
  - !Item
    name: text
    desc: text or image path, depending on the control type
    type: String
- call: !Binary
  - control
  - text
  ret:
    type: Nothing
  left: !Item
    name: control
    type: Control
  right: !Item
    name: text
    type: String
argument_loc: Local
effect_loc: Local
since: {}
examples:
- <sqf>ctrlSetText [100, "Hello world"]; // for Dialogs</sqf>
- <sqf>_control ctrlSetText "Hello world."; // for Displays</sqf>
see_also:
- ctrlText
- ctrlTextSelection
- ctrlSetTextSelection
