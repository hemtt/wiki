name: enableAttack
desc: Set if leader can issue attack commands to the soldiers in his group.
groups:
- Groups
- Unit Control
syntax:
- call: !Binary
  - group
  - enable
  ret:
    type: Nothing
  left: !Item
    name: group
    desc: or [[Group]]
    type: Object
  right: !Item
    name: enable
    type: Boolean
argument_loc: Local
effect_loc: Global
since: {}
examples:
- <sqf>_group1 enableAttack true;</sqf>
see_also:
- attackEnabled
