name: tvPictureRight
desc: Returns the right picture of a [[CT_TREE]] on given path.
groups:
- GUI Control - Tree View
syntax:
- call: !Unary
  - idc
  - path
  ret:
    type: String
    desc: path to picture
  right: !Array
  - !Item
    name: idc
    type: Number
  - !Item
    name: path
    type: Path
- call: !Binary
  - ctrl
  - path
  ret:
    type: String
    desc: path to picture
  left: !Item
    name: ctrl
    type: Control
  right: !Item
    name: path
    type: Path
argument_loc: Unspecified
effect_loc: Unspecified
since: {}
examples:
- <sqf>private _result = _controlTV tvPictureRight [0, 0];</sqf>
see_also:
- tvSetPictureRight
- tvSetPicture
- tvPicture
