name: attackEnabled
desc: Return whether a group's leader can issue attack commands to soldiers under his command.
groups:
- Groups
- Unit Control
syntax:
- call: !Unary name
  ret:
    type: Boolean
  right: !Item
    name: name
    desc: or [[Group]]
    type: Object
argument_loc: Global
effect_loc: Unspecified
since:
  ofpe: '1.00'
  arma1: '1.00'
  arma2: '1.00'
  arma2oa: '1.50'
  tkoh: '1.00'
  arma3: '0.50'
examples:
- <sqf>if (not attackEnabled _soldier) then { _soldier setCombatMode "Careless" };</sqf>
see_also:
- enableAttack
