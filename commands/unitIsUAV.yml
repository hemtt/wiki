name: unitIsUAV
desc: |-
  Returns whether or not the given transport object is a drone (UAV, UGV), regardless of if it has a crew or if it is empty,
  corresponding to the <syntaxhighlight lang="cpp" inline>isUAV</syntaxhighlight> transport parameter.<br>
  {{GVI|arma3|2.14|size= 0.75}} The command can be used to check if the provided unit is a UAV unit.
groups:
- Remote Control
syntax:
- call: !Unary object
  ret:
    type: Boolean
    desc: '[[true]] when UAV'
  right: !Item
    name: object
    desc: vehicle or {{GVI|arma3|2.14|size= 0.75}} unit
    type: Object
argument_loc: Unspecified
effect_loc: Unspecified
since: {}
examples:
- "<sqf>\nunitIsUAV _myUAV;\t\t\t// true (whether it has driver/gunner or not)\nunitIsUAV driver _myUAV;\t// true (provided there is a driver)\nunitIsUAV gunner _myUAV;\t// true (provided there is a gunner)\n</sqf>"
see_also:
- allUnitsUAV
