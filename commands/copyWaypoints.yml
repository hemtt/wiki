name: copyWaypoints
desc: Copy the chain of waypoints from source to target group. The target group will start to process waypoints from the first one.
groups:
- Waypoints
syntax:
- call: !Binary
  - groupTo
  - groupFrom
  ret:
    type: Nothing
  left: !Item
    name: groupTo
    type: Group
  right: !Item
    name: groupFrom
    type: Group
argument_loc: Unspecified
effect_loc: Unspecified
since: {}
examples:
- <sqf>group1 copyWaypoints group2;</sqf>
