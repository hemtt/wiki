name: addonFiles
desc: |-
  Returns a list of files present in the addon.<br>
  {{Feature|informative|Querying protected {{hl|.ebo}} addons will return an empty array {{hl|[]}}.}}
groups:
- Mods and Addons
syntax:
- call: !Unary
  - prefix
  - fileExtension
  ret:
    type: !ArrayUnsized
      value: String
  right: !Array
  - !Item
    name: prefix
    desc: addon prefix available from [[allAddonsInfo]]. Since {{GVI|arma3|2.22}} it is possible to also return all files present in a scenario folder from within [[Eden Editor]] or Eden preview with the special prefix {{hl|$mission}}
    type: String
  - !Item
    name: fileExtension
    desc: file extension to filter results, for example {{hl|".paa"}}
    type: String
    optional: true
argument_loc: Unspecified
effect_loc: Unspecified
since: {}
examples:
- "<sqf>\naddonFiles [\"a3\\3den\\\", \".paa\"];\n/*\n\t[\n\t\t\"a3\\3den\\data\\attributes\\formation\\ech_left_ca.paa\",\n\t\t\"a3\\3den\\data\\attributes\\formation\\stag_column_ca.paa\",\n\t\t\"a3\\3den\\data\\attributes\\stance\\down_ca.paa\",\n\t\t\"a3\\3den\\data\\cfg3den\\layer\\icondisabled_ca.paa\",\n\t\t\"a3\\3den\\data\\controlsgroups\\diagmousecontrol\\mouse_ca.paa\",\n\t\t...\n\t]\n*/\n</sqf>"
- |-
  <sqf>
  // Since Arma 3 2.22
  addonFiles ["$mission", ".sqf"];
  </sqf>
see_also:
- allAddonsInfo
