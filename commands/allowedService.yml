name: allowedService
desc: |-
  Returns which types of repair/refuel/rearm service are allowed. The two available types are manual, where the action is displayed to the user, and auto, where the service happens within distance.
  The engine default is both (manual and auto) for historic reasons.
groups:
- Object Manipulation
syntax:
- call: !Unary vehicle
  ret:
    type: Number
    desc: '0: none, 1: auto, 2: manual, 3: both, -1: unsupported'
  right: !Item
    name: vehicle
    desc: supply vehicle, i.e. ammo truck
    type: Object
argument_loc: Global
effect_loc: Unspecified
since:
  arma3: '2.12'
examples:
- <sqf>if (allowedService _vehicle == -1) then { hint "this is not a service vehicle!" };</sqf>
see_also:
- allowService
- needService
