name: menuChecked
desc: Returns if item on given path is checked or not.
groups:
- GUI Control - Menu
syntax:
- call: !Unary
  - idc
  - path
  ret:
    type: Boolean
  right: !Array
  - !Item
    name: idc
    type: Number
  - !Item
    name: path
    type: TreeViewPath
- call: !Binary
  - control
  - path
  ret:
    type: Boolean
  left: !Item
    name: control
    type: Control
  right: !Item
    name: path
    type: TreeViewPath
argument_loc: Unspecified
effect_loc: Unspecified
since: {}
examples:
- <sqf>private _isChecked = findDisplay 313 displayCtrl 120 menuChecked [0, 1];</sqf>
see_also:
- menuSetCheck
