name: nearestBuilding
desc: Finds the nearest building to a given object or position. A "building" is defined as an object that is of class "House" and contains a path LOD.
groups:
- Object Detection
syntax:
- call: !Unary position
  ret:
    type: Object
  right: !Item
    name: position
    desc: or [[Position#Introduction|Position2D]] or [[Position#PositionAGL|PositionAGL]]
    type: Object
argument_loc: Unspecified
effect_loc: Unspecified
since: {}
examples:
- <sqf>_nBuilding = nearestBuilding player;</sqf>
- <sqf>_nBuilding = nearestBuilding position player;</sqf>
see_also:
- buildingPos
- nearestObject
- nearestObjects
- nearObjects
- nearestLocation
- nearEntities
- nearTargets
- nearSupplies
- nearestLocationWithDubbing
- nearObjectsReady
- nearRoads
- nearestMines
