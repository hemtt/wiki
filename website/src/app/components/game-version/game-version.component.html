@if (slim) {
    <span>{{gameName}} {{versionText}}</span>
} @else {
<div class="flex flex-col items-center bg-gray-200 p-1 rounded" [title]="tooltip">
    <div class="flex items-center justify-center w-8 h-8 mb-1">
        <img [src]="image" alt="{{game}} logo" class="w-max">
    </div>
    <span class="text-sm font-medium">{{versionText}}</span>
</div>
}
